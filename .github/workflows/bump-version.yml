name: Bump Version, Tag, and Release on Push

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-and-release:
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check package.json exists
        id: pkg
        run: |
          if [ ! -f package.json ]; then
            echo "package.json not found; skipping version bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine bump type from Commit Message
        id: bump
        if: steps.pkg.outputs.skip == 'false'
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          msg="$COMMIT_MSG"
          bump="skip"
          
          # Check the commit message for Conventional Commits
          if [[ "$msg" =~ ^[a-z]+(\([a-z0-9_-]+\))?!: ]] || [[ "$msg" == *"BREAKING CHANGE"* ]]; then
            bump="major"
          elif [[ "$msg" =~ ^feat(\([a-z0-9_-]+\))?: ]]; then
            bump="minor"
          elif [[ "$msg" =~ ^(fix|perf|refactor)(\([a-z0-9_-]+\))?: ]]; then
            bump="patch"
          fi
          
          echo "Computed bump=$bump for commit message."
          echo "type=$bump" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.pkg.outputs.skip == 'false' && steps.bump.outputs.type != 'skip'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        if: steps.pkg.outputs.skip == 'false' && steps.bump.outputs.type != 'skip'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version
        id: ver
        if: steps.pkg.outputs.skip == 'false' && steps.bump.outputs.type != 'skip'
        run: |
          pnpm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit, Tag, and Push
        if: steps.pkg.outputs.skip == 'false' && steps.bump.outputs.type != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${{ steps.ver.outputs.version }}"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.pkg.outputs.skip == 'false' && steps.bump.outputs.type != 'skip'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "Release v${{ steps.ver.outputs.version }}" \
            --generate-notes