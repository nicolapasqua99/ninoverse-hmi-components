name: Bump Version, Tag, and Release on Push

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-and-release:
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    steps:
      # 1. Generate an installation token using your GitHub App credentials
      - name: Generate Token from GitHub App
        id: get_workflow_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # 2. Checkout the repository using the App Token instead of GITHUB_TOKEN
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.get_workflow_token.outputs.token }}

      - name: Check package.json exists
        id: pkg
        run: |
          if [ ! -f package.json ]; then
            echo "package.json not found; skipping version bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine bump type from Commit Message
        id: bump
        if: steps.pkg.outputs.skip == 'false'
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          msg=$(echo "$COMMIT_MSG" | head -n 1)
          bump="skip"
          
          echo "Analyzing commit subject: $msg"
          
          # 1. Major (Breaking Change: explicit ! or BREAKING CHANGE anywhere in the message)
          if [[ "$msg" =~ ^[a-z]+(\([a-z0-9_-]+\))?!: ]] || [[ "$COMMIT_MSG" == *"BREAKING CHANGE"* ]]; then
            bump="major"
          # 2. Minor (New features)
          elif [[ "$msg" =~ ^feat(\([a-z0-9_-]+\))?: ]]; then
            bump="minor"
          # 3. Patch (Fixes, Perf, Refactor, and other changes that don't alter user behavior but merit a version bump)
          elif [[ "$msg" =~ ^(fix|perf|refactor|revert|style|chore|docs)(\([a-z0-9_-]+\))?: ]]; then
            bump="patch"
          fi
          
          echo "Computed bump=$bump for commit message."
          echo "type=$bump" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.pkg.outputs.skip == 'false' && steps.bump.outputs.type != 'skip'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        if: steps.pkg.outputs.skip == 'false' && steps.bump.outputs.type != 'skip'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version
        id: ver
        if: steps.pkg.outputs.skip == 'false' && steps.bump.outputs.type != 'skip'
        run: |
          pnpm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit, Tag, and Push
        if: steps.pkg.outputs.skip == 'false' && steps.bump.outputs.type != 'skip'
        run: |
          git config user.name "ninoverse-bump-version-app[bot]"
          git config user.email "ninoverse-bump-version-app[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${{ steps.ver.outputs.version }}"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin main --tags

      # 3. Create the GitHub Release using the App Token to authorization constraints
      - name: Create GitHub Release
        if: steps.pkg.outputs.skip == 'false' && steps.bump.outputs.type != 'skip'
        env:
          GITHUB_TOKEN: ${{ steps.get_workflow_token.outputs.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "Release v${{ steps.ver.outputs.version }}" \
            --generate-notes
