name: Bump Version, Tag, and Release on Push

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      deploy_gcp:
        description: 'Publish to GCP Artifact Registry'
        type: boolean
        default: false
      deploy_npm:
        description: 'Publish to npm registry'
        type: boolean
        default: false
      deploy_tarball:
        description: 'Attach tarball to GitHub Release'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Ref '${{ github.ref_name }}' is not a valid vX.Y.Z tag. Run this workflow from a version tag."
            exit 1
          fi

      - name: Generate Token from GitHub App
        id: get_workflow_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.get_workflow_token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # For now commented, release will be saved on releases page for now
      - name: Setup Node for npm publish
        if: inputs.deploy_npm == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        if: inputs.deploy_npm == 'true'
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Authenticate to GCP
        if: inputs.deploy_gcp == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure npm registry for Artifact Registry
        if: inputs.deploy_gcp == 'true'
        run: |
          echo "@ninoverse:registry=https://${{ vars.GCP_REGION }}-npm.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/" >> .npmrc
          npx google-artifactregistry-auth --repo-config .npmrc

      - name: Publish to Artifact Registry
        if: inputs.deploy_gcp == 'true'
        run: pnpm publish --no-git-checks

      - name: Pack tarball
        if: inputs.deploy_tarball == 'true'
        run: pnpm pack

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ steps.get_workflow_token.outputs.token }}
        run: |
          if [[ "${{ inputs.deploy_tarball }}" == "true" ]]; then
            gh release create "${{ github.ref_name }}" \
              --title "Release ${{ github.ref_name }}" \
              --generate-notes \
              *.tgz
          else
            gh release create "${{ github.ref_name }}" \
              --title "Release ${{ github.ref_name }}" \
              --generate-notes
          fi